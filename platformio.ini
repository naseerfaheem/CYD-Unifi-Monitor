; PlatformIO Project Configuration File for UniFi Network Monitor
; ESP32-S3 4.0" CYD (320x480)

[env:esp32-cyd]
platform = espressif32
board = esp32dev
framework = arduino

; Debug configuration
build_type = debug
monitor_filters = esp32_exception_decoder, colorize, time
debug_tool = esp-prog
debug_init_break = tbreak setup

; Serial Monitor
monitor_speed = 115200

; Upload settings
upload_speed = 921600
upload_port = COM6  ; Your CYD is now on COM6

; Build flags - CORRECTED ST7796 4.0" CYD configuration from working examples
build_flags =
    -D LV_CONF_INCLUDE_SIMPLE
    -D LV_FONT_MONTSERRAT_12=1
    -D LV_FONT_MONTSERRAT_24=1
    -D USER_SETUP_LOADED=1
    -D ST7796_DRIVER=1  ; Correct driver for CYD 4.0"
    -D TFT_WIDTH=320
    -D TFT_HEIGHT=480
    ; Display SPI pins (HSPI)
    ; -D TFT_MISO=12  ; DO NOT CONNECT MISO - ST7796 doesn't release SPI bus!
    -D TFT_MOSI=13
    -D TFT_SCLK=14
    -D TFT_CS=15
    -D TFT_DC=2
    -D TFT_RST=-1  ; No reset
    -D TFT_BL=27   ; Backlight
    -D TFT_BACKLIGHT_ON=HIGH
    ; Touch controller pins (XPT2046) - SEPARATE from display!
    -D TOUCH_CS=33    ; Touch chip select
    -D TOUCH_IRQ=36   ; Touch interrupt (optional)
    ; Touch uses same SPI bus as display but different CS
    -D XPT2046_IRQ=36
    -D XPT2046_MOSI=32
    -D XPT2046_MISO=39
    -D XPT2046_CLK=25
    ; -D TFT_INVERSION_ON  ; Disabled - causing white background
    -D TFT_RGB_ORDER=TFT_RGB  ; Try RGB instead of BGR
    ; Use HSPI for display
    -D USE_HSPI_PORT
    -D LOAD_GLCD=1
    -D LOAD_FONT2=1
    -D LOAD_FONT4=1
    -D LOAD_FONT6=1
    -D LOAD_FONT7=1
    -D LOAD_FONT8=1
    -D LOAD_GFXFF=1
    -D SMOOTH_FONT=1
    -D SPI_FREQUENCY=40000000  ; Standard speed for ST7796
    -D SPI_READ_FREQUENCY=16000000
    -D SPI_TOUCH_FREQUENCY=2500000
    -D DEBUG_API=1
    -D UNIFI_SKIP_SSL_VERIFY=1

; Library dependencies
lib_deps = 
    bodmer/TFT_eSPI@^2.5.34
    lvgl/lvgl@^8.3.11
    bblanchon/ArduinoJson@^7.0.2
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    
; Extra libraries for development
lib_extra_dirs = 
    lib

; Partition scheme for more program space
board_build.partitions = huge_app.csv

; Debug settings (uncomment for debugging)
; debug_tool = esp-prog
; debug_init_break = tbreak setup
; build_type = debug